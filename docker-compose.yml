# Shared build settings for the CAG services.
x-cag-service: &cag-service
  build:
    context: ./CAG
    dockerfile: Dockerfile
  image: customer-support-cag:latest
  env_file:
    - ./.env
  volumes:
    - ./CAG/runs:/app/runs

# Shared build settings for the RAG services.
x-rag-service: &rag-service
  build:
    context: ./RAG
    dockerfile: Dockerfile
  image: customer-support-rag:latest
  env_file:
    - ./.env
  volumes:
    - ./RAG/runs:/app/runs
    - ./RAG/chroma_db:/app/chroma_db

services:
  # Unified demo app that runs frontend, CAG, RAG, and both order APIs.
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    image: customer-support-app:latest
    env_file:
      - ./.env
    volumes:
      - ./CAG/runs:/app/CAG/runs
      - ./RAG/runs:/app/RAG/runs
      - ./RAG/chroma_db:/app/RAG/chroma_db
    ports:
      - "3000:3000"
      - "8000:8000"
      - "8001:8001"
      - "8080:8080"
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # CAG API service.
  cag-agent:
    <<: *cag-service
    command: ["python", "server.py"]
    ports:
      - "8000:8000"
    profiles: ["cag"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # CAG mock order API.
  cag-orders:
    <<: *cag-service
    command: ["python", "order_api.py"]
    ports:
      - "8080:8080"
    profiles: ["cag"]

  # RAG API service.
  rag-agent:
    <<: *rag-service
    command: ["python", "server.py"]
    ports:
      - "8001:8001"
    profiles: ["rag"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # RAG mock order API.
  rag-orders:
    <<: *rag-service
    command: ["python", "order_api.py"]
    ports:
      - "8081:8080"
    profiles: ["rag"]

  # CAG test runner.
  cag-test:
    <<: *cag-service
    command: ["pytest", "tests/", "-v", "--tb=short"]

  # RAG test runner.
  rag-test:
    <<: *rag-service
    command: ["pytest", "tests/", "-v", "--tb=short"]
